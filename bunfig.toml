[test]

# These tests spawn real servers or use isomorphic-git operations that
# can interfere with other git-based tests when run concurrently. They
# run as a separate pass after the main suite via package.json's `test`
# script.
exclude = [
  "tests/hub-agent/deploy-flow.test.ts",
  "tests/inference/transform-cutover.test.ts",
  "tests/skill-attachment-flow.test.ts",
  "tests/hub-api/lib/git-harness.test.ts",
  "tests/hub-api/git-asset-clone.test.ts",
  "tests/hub-api/git-asset-push.test.ts",
  "tests/hub-api/git-asset-roundtrip.test.ts",
  "tests/hub-api/git-asset-negotiation.test.ts",
  "tests/hub-api/git-asset-concurrent-push.test.ts",
  "tests/hub-api/git-asset-thin-pack.test.ts",
  "tests/hub-api/git-asset-create-roundtrip.test.ts",
  "tests/hub-api/git-protocol-compat.test.ts",
  "tests/hub-api/git-bearer-failure-modes.test.ts",
  "tests/hub-api/git-agent-state-clone-instance.test.ts",
  "tests/hub-api/git-agent-state-clone-definition.test.ts",
  "tests/hub-api/git-agent-state-push-denied.test.ts",
]
